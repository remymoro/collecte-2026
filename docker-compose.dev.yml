version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: collecte-2026-db
    environment:
      POSTGRES_USER: collecte
      POSTGRES_PASSWORD: collecte
      POSTGRES_DB: collecte_2026
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
