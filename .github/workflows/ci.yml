name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  actions: read
  contents: read

env:
  NX_BASE: ${{ github.event_name == 'pull_request' && format('origin/{0}', github.base_ref) || 'HEAD~1' }}
  NX_HEAD: HEAD
  NX_IGNORE_UNSUPPORTED_TS_SETUP: true

jobs:
  setup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4.1.0
        with:
          version: 10
      - uses: actions/setup-node@v4.4.0
        with:
          node-version: 24
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec prisma generate --schema packages/collectes/infrastructure/src/prisma/schema.prisma
      - run: pnpm nx format:check

  lint:
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4.1.0
        with:
          version: 10
      - uses: actions/setup-node@v4.4.0
        with:
          node-version: 24
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec prisma generate --schema packages/collectes/infrastructure/src/prisma/schema.prisma
      - run: pnpm nx affected -t lint --exclude=@collecte-2026/workspace --base=${{ env.NX_BASE }} --head=${{ env.NX_HEAD }}

  typecheck:
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4.1.0
        with:
          version: 10
      - uses: actions/setup-node@v4.4.0
        with:
          node-version: 24
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec prisma generate --schema packages/collectes/infrastructure/src/prisma/schema.prisma
      - run: pnpm nx affected -t typecheck --exclude=@collecte-2026/workspace --parallel=1 --base=${{ env.NX_BASE }} --head=${{ env.NX_HEAD }}

  test:
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4.1.0
        with:
          version: 10
      - uses: actions/setup-node@v4.4.0
        with:
          node-version: 24
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec prisma generate --schema packages/collectes/infrastructure/src/prisma/schema.prisma
      - run: pnpm nx affected -t test --exclude=@collecte-2026/workspace --base=${{ env.NX_BASE }} --head=${{ env.NX_HEAD }}

  build:
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test]
    steps:
      - uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4.1.0
        with:
          version: 10
      - uses: actions/setup-node@v4.4.0
        with:
          node-version: 24
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec prisma generate --schema packages/collectes/infrastructure/src/prisma/schema.prisma
      - run: pnpm nx affected -t build --exclude=@collecte-2026/workspace --parallel=1 --base=${{ env.NX_BASE }} --head=${{ env.NX_HEAD }}
